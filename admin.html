<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">

        <!-- 登录表单 -->
        <div class="login-container" id="loginBox">
            <h2>♠ 管理后台</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" autocomplete="off" required>
                </div>
                <div class="error-msg" id="loginError">用户名或密码错误</div>
                <button type="submit" class="btn btn-primary" style="margin-top:12px;">登 录</button>
            </form>
        </div>

        <!-- 管理面板 -->
        <div class="admin-panel" id="adminPanel">
            <div class="admin-header">
                <h2>♠ 积分管理</h2>
                <div>
                    <button class="btn btn-secondary" onclick="location.href='index.html'">查看榜单</button>
                    <button class="btn btn-danger" onclick="logout()" style="margin-left:8px;">退出</button>
                </div>
            </div>

            <!-- GitHub Token -->
            <div class="token-section" id="tokenSection">
                <h3 style="margin-bottom:8px;">GitHub 配置</h3>
                <p>需要 GitHub Personal Access Token 来保存数据到仓库。<br>
                   前往 <a href="https://github.com/settings/tokens" target="_blank" style="color:var(--accent)">GitHub Settings → Tokens</a> 生成（勾选 repo 权限）。</p>
                <div class="form-group" style="margin-top:12px;">
                    <label>Personal Access Token</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <button class="btn btn-secondary" onclick="saveToken()">保存 Token</button>
                <span id="tokenStatus" style="margin-left:10px;font-size:0.85rem;color:var(--green);display:none;">已保存</span>
            </div>

            <!-- 录入新对局 -->
            <div class="input-section">
                <h3>录入新对局</h3>
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="gameDate">
                </div>
                <div class="player-inputs" id="playerInputs"></div>
                <button class="add-player-btn" onclick="addPlayerRow()">+ 添加玩家</button>
                <div class="actions">
                    <button class="btn btn-primary" onclick="submitGame()" style="flex:1;">保存对局</button>
                </div>
                <div class="error-msg" id="submitError"></div>
                <div class="success-msg" id="submitSuccess"></div>
            </div>

            <!-- 已有对局列表 -->
            <div class="existing-games" id="existingGames">
                <h3>已有对局</h3>
                <div id="gamesList"></div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
